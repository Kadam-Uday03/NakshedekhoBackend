# ============================================================
# NaksheDekho - Application Configuration TEMPLATE
# ============================================================
# 🚨 COPY this file to application.properties and fill in real values
# Never commit application.properties to Git!
# ============================================================

# Server
server.port=8080
spring.application.name=nakshedekho

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/nakshedekho_db
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT (use a long random string, min 64 characters)
jwt.secret=YOUR_LONG_RANDOM_JWT_SECRET_MIN_64_CHARS_HERE
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging (use WARN or ERROR in production)
logging.level.com.nakshedekho=WARN
logging.level.org.springframework.security=WARN

# Razorpay
razorpay.key.id=YOUR_RAZORPAY_KEY_ID
razorpay.key.secret=YOUR_RAZORPAY_KEY_SECRET

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL_ADDRESS
spring.mail.password=YOUR_GMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.debug=false

# Google OAuth
google.client.id=YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com

# Error handling (never expose internals to client)
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
