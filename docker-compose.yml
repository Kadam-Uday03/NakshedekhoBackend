services:
  db:
    image: mysql:8.0
    container_name: nakshedekho-db
    restart: always
    environment:
      MYSQL_DATABASE: nakshedekho_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nakshedekho-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/nakshedekho_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=NaksheDekhoSecretKeyForJWTTokenGenerationAndValidation2024PremiumInteriorDesignPlatform
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-rzp_test_S5jXL3PACzEwMA}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-n6tsfAJM0DBH6Q8a6i4MuCZO}
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME:-nakshedekho@gmail.com}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD:-znaehcemaqigqakc}
    volumes:
      - ./backend/uploads:/app/uploads
    restart: always

volumes:
  db-data:
