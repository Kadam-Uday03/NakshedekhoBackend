services:
  db:
    image: postgres:16-alpine
    container_name: nakshedekho-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nakshedekho-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - JWT_SECRET=${JWT_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - ADMIN_OWNER_EMAIL=${ADMIN_OWNER_EMAIL}
      - ADMIN_OWNER_PASSWORD=${ADMIN_OWNER_PASSWORD}
      - ADMIN_OWNER2_EMAIL=${ADMIN_OWNER2_EMAIL}
      - ADMIN_OWNER2_PASSWORD=${ADMIN_OWNER2_PASSWORD}
      - ADMIN_MANAGER_EMAIL=${ADMIN_MANAGER_EMAIL}
      - ADMIN_MANAGER_PASSWORD=${ADMIN_MANAGER_PASSWORD}
    volumes:
      - ./backend/uploads:/app/uploads
    restart: always

volumes:
  db-data:
